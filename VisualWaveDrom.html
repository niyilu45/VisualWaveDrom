<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VisualWaveDrom</title>
  <script src="inc/skins/default.js"></script>
  <script src="inc/wavedrom.min.js"></script>
  <link rel="stylesheet" href="inc/visualwavedrom.css">
</head>
<body>
  <div class="app" id="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1>VisualWaveDrom</h1>
        <p>波形可视化编辑器</p>
      </div>

      <!-- Function Menu -->
      <div class="menu-section">
        <div class="menu-section-title">功能菜单</div>
        <button class="menu-btn" id="btn-reading-mode" title="阅读模式">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          阅读模式
        </button>
        <button class="menu-btn" id="btn-undo" title="撤销 (Ctrl+Z)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
          </svg>
          撤销
          <span class="shortcut">Ctrl+Z</span>
        </button>
        <button class="menu-btn" id="btn-redo" title="重做 (Ctrl+Shift+Z)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.13-9.36L23 10"/>
          </svg>
          重做
          <span class="shortcut">Ctrl+Shift+Z</span>
        </button>
        <div class="menu-control-row">
          <label class="menu-control-label" for="input-hscale">水平缩放</label>
          <input type="number" id="input-hscale" class="menu-control-input"
            min="1" max="20" step="1" value="1"
            title="config.hscale（1–20 整数，Enter 或失焦应用）">
        </div>
      </div>

      <!-- Waveform Menu -->
      <div class="menu-section">
        <div class="menu-section-title">波形菜单</div>
        <div class="wave-add-delete-row">
          <button class="menu-btn legend-add-btn" id="btn-add-signal" type="button" title="在 signal 数组末尾插入新信号行">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            新增行
          </button>
          <button class="menu-btn wave-delete-signal-btn" id="btn-delete-signal" type="button" disabled title="请先在波形区点击选中一行">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
              <path d="M10 11v6M14 11v6"/>
              <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
            </svg>
            删除行
          </button>
        </div>
        <div class="wave-move-row">
          <button class="menu-btn wave-move-signal-btn" id="btn-move-signal-up" type="button" disabled title="请先在波形区点击选中一行">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <polyline points="18 15 12 9 6 15"/>
            </svg>
            行上移
          </button>
          <button class="menu-btn wave-move-signal-btn" id="btn-move-signal-down" type="button" disabled title="请先在波形区点击选中一行">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
            行下移
          </button>
        </div>
        <div class="wave-group-row">
          <button class="menu-btn wave-group-signal-btn" id="btn-group-signal" type="button" title="先点击分组，再点击起始行与结束行">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <rect x="4" y="4" width="16" height="16" rx="2"/>
              <path d="M8 9h8M8 15h8"/>
            </svg>
            分组
          </button>
        </div>
        <div class="wave-mode-delete-row">
          <button type="button" class="menu-btn wave-edit-mode-btn mode-modify" id="btn-wave-edit-mode" aria-pressed="false" aria-label="修改模式" title="当前为修改模式：点击图例替换选中列字符；点击切换为插入模式">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
            <span class="wave-edit-mode-label">修改模式</span>
          </button>
          <button class="menu-btn wave-delete-col-btn" id="btn-delete-wave-col" type="button" disabled title="请先在波形区点击选中一行">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
              <path d="M10 11v6M14 11v6"/>
              <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
            </svg>
            删除
          </button>
        </div>
        <div class="legend-list" id="legend-list"></div>
      </div>

      <!-- Connection Relations -->
      <div class="menu-section">
        <div class="menu-section-title">连接关系</div>
        <button class="menu-btn legend-add-btn" id="btn-add-connection" type="button" title="在波形上选两个点后插入连接（WaveDrom node 锚点）">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          新增连接
        </button>
        <div class="connection-pick-toggle">
          <button type="button" id="btn-connection-pick" title="开启后在波形上依次点击起点与终点">选点模式</button>
        </div>
        <div class="connection-point-status" id="connection-point-status">连接点：未选择（需起点 + 终点）</div>
        <div class="connection-label-edit" id="connection-label-edit">
          <div class="connection-label-edit-label" id="connection-label-edit-title">连接标签</div>
          <div class="connection-label-edit-row">
            <input type="text" id="connection-label-input" placeholder="新连接标签（可选，插入时使用）" spellcheck="false">
            <button type="button" id="btn-apply-edge-label">应用</button>
          </div>
          <div class="connection-label-edit-hint" id="connection-label-edit-hint">未选中连接时，标签将用于下次插入</div>
        </div>
        <div class="connection-list" id="connection-list"></div>
        <div class="connection-edge-section">
          <div class="connection-edge-title">当前连接</div>
          <div class="connection-edge-list" id="connection-edge-list"></div>
        </div>
      </div>

      <!-- Saved Tags -->
      <div class="menu-section">
        <div class="menu-section-title">已保存标签</div>
        <div class="saved-tags-list" id="saved-tags-list"></div>
        <div class="saved-tags-empty" id="saved-tags-empty">暂无保存的标签</div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <button class="back-btn" id="btn-back" title="返回正常模式">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>

      <div class="wave-panel" id="wave-panel">
        <div class="wave-container" id="wave-container"></div>
      </div>

      <div class="editor-panel" id="editor-panel">
        <div class="editor-header">
          <span>WaveDrom JSON</span>
          <div class="editor-header-actions">
            <button type="button" class="editor-copy-btn" id="btn-save-tag" title="将当前 JSON 与编辑状态保存到标签">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                <polyline points="17 21 17 13 7 13 7 21"/>
                <polyline points="7 3 7 8 15 8"/>
              </svg>
              <span>保存到标签</span>
            </button>
            <button type="button" class="editor-copy-btn" id="btn-format-json" title="格式化并对齐当前 JSON">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <line x1="8" y1="6" x2="21" y2="6"/>
                <line x1="8" y1="12" x2="21" y2="12"/>
                <line x1="8" y1="18" x2="21" y2="18"/>
                <line x1="3" y1="6" x2="3.01" y2="6"/>
                <line x1="3" y1="12" x2="3.01" y2="12"/>
                <line x1="3" y1="18" x2="3.01" y2="18"/>
              </svg>
              <span>格式化</span>
            </button>
            <button type="button" class="editor-copy-btn" id="btn-export-json" title="导出当前波形 JSON 文件">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
              <span>导出</span>
            </button>
            <button type="button" class="editor-copy-btn" id="btn-import-json" title="导入本地波形 JSON 文件">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
              <span>导入</span>
            </button>
            <button type="button" class="editor-copy-btn" id="btn-copy-json" title="复制全部 JSON 到剪贴板">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
              </svg>
              <span class="btn-copy-label">复制 JSON</span>
            </button>
            <input type="file" id="json-import-input" accept="application/json,.json" hidden>
            <div class="editor-status">
              <span class="status-dot" id="status-dot"></span>
              <span id="status-text">就绪</span>
            </div>
          </div>
        </div>
        <div class="editor-wrapper">
          <div class="line-numbers" id="line-numbers"></div>
          <textarea class="code-editor" id="code-editor" spellcheck="false"></textarea>
        </div>
      </div>
    </main>
  </div>

  <!-- Save tag modal -->
  <div class="modal-overlay" id="tag-save-modal" hidden>
    <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="tag-save-modal-title">
      <div class="modal-header" id="tag-save-modal-title">保存到标签</div>
      <div class="modal-body" id="tag-save-form">
        <label class="modal-radio">
          <div class="modal-radio-row">
            <input type="radio" name="tag-save-mode" id="tag-mode-overwrite" value="overwrite">
            <span>覆盖已有标签</span>
          </div>
          <select class="modal-select modal-radio-control" id="tag-overwrite-select" disabled></select>
        </label>
        <label class="modal-radio">
          <div class="modal-radio-row">
            <input type="radio" name="tag-save-mode" id="tag-mode-new" value="new" checked>
            <span>新增标签</span>
          </div>
          <input type="text" class="modal-input modal-radio-control" id="tag-new-name-input"
            placeholder="输入标签名" spellcheck="false" autocomplete="off">
        </label>
        <div class="modal-hint" id="tag-save-hint"></div>
      </div>
      <div class="modal-body modal-duplicate-confirm" id="tag-save-duplicate" hidden>
        <p id="tag-save-duplicate-msg">标签名已存在，是否覆盖？</p>
      </div>
      <div class="modal-footer" id="tag-save-footer">
        <button type="button" class="modal-btn" id="tag-save-cancel">取消</button>
        <button type="button" class="modal-btn modal-btn-primary" id="tag-save-confirm">保存</button>
      </div>
      <div class="modal-footer" id="tag-duplicate-footer" hidden>
        <button type="button" class="modal-btn" id="tag-duplicate-no">否</button>
        <button type="button" class="modal-btn modal-btn-primary" id="tag-duplicate-yes">是</button>
      </div>
    </div>
  </div>

  <!-- Load tag confirm modal -->
  <div class="modal-overlay" id="tag-load-modal" hidden>
    <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="tag-load-modal-title">
      <div class="modal-header" id="tag-load-modal-title">确认还原</div>
      <div class="modal-body modal-duplicate-confirm">
        <p id="tag-load-confirm-msg"></p>
      </div>
      <div class="modal-footer">
        <button type="button" class="modal-btn" id="tag-load-cancel">取消</button>
        <button type="button" class="modal-btn modal-btn-primary" id="tag-load-confirm">放弃修改并还原</button>
      </div>
    </div>
  </div>

    <script src="inc/visualwavedrom-app.js"></script>
</body>
</html>
