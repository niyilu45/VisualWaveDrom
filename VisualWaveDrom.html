  <style>
    :root {
      --sidebar-width: 220px;
      --bg: #0f1419;
      --surface: #1a2332;
      --surface-2: #243044;
      --border: #2d3a4f;
      --text: #e6edf3;
      --text-muted: #8b9cb3;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --success: #22c55e;
      --error: #ef4444;
      --line-num-bg: #151c28;
      --editor-font: "Cascadia Code", "Fira Code", Consolas, "Courier New", monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    .app {
      display: flex;
      height: 100vh;
      transition: all 0.25s ease;
    }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      transition: transform 0.25s ease, width 0.25s ease, min-width 0.25s ease;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .sidebar-header p {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .menu-section {
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .menu-section:last-child { border-bottom: none; }

    .menu-section-title {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      padding: 0 16px 8px;
    }

    .menu-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 16px;
      border: none;
      background: transparent;
      color: var(--text);
      font-size: 0.875rem;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s;
    }

    .menu-btn:hover { background: var(--surface-2); }
    .menu-btn:active { background: var(--border); }
    .menu-btn:disabled {
      cursor: default;
      opacity: 0.45;
    }
    .menu-btn:disabled:hover { background: transparent; }

    .menu-btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      opacity: 0.85;
    }

    .menu-btn .shortcut {
      margin-left: auto;
      font-size: 0.7rem;
      color: var(--text-muted);
      font-family: var(--editor-font);
    }

    .menu-btn-group {
      display: flex;
      gap: 4px;
      padding: 0 12px;
    }

    .menu-btn-group .menu-btn {
      flex: 1;
      justify-content: center;
      border-radius: 6px;
      padding: 8px;
    }

    .menu-btn-group .menu-btn .shortcut { display: none; }

    .menu-control-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 12px 10px;
    }

    .menu-control-label {
      flex: 1;
      font-size: 0.875rem;
      color: var(--text);
    }

    .menu-control-input {
      width: 52px;
      padding: 5px 6px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface-2);
      color: var(--text);
      font-size: 0.8125rem;
      font-family: var(--editor-font);
      text-align: center;
    }

    .menu-control-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .menu-control-input::-webkit-outer-spin-button,
    .menu-control-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .menu-control-input[type="number"] {
      -moz-appearance: textfield;
      appearance: textfield;
    }

    /* Legend */
    .legend-add-btn {
      border-radius: 8px;
      background: var(--surface-2);
      border: 1px dashed var(--border);
    }

    .legend-add-btn:hover {
      border-color: var(--accent);
      background: var(--border);
    }

    .menu-section > .menu-btn.legend-add-btn {
      margin: 0 12px 8px;
    }

    .wave-add-delete-row,
    .wave-move-row,
    .wave-mode-delete-row {
      display: flex;
      gap: 6px;
      margin: 0 12px 8px;
    }

    .wave-add-delete-row .legend-add-btn,
    .wave-add-delete-row .wave-delete-signal-btn,
    .wave-move-row .wave-move-signal-btn,
    .wave-mode-delete-row .wave-edit-mode-btn,
    .wave-mode-delete-row .wave-delete-col-btn {
      flex: 1 1 0;
      min-width: 0;
      width: auto;
      margin: 0;
      padding: 8px 6px;
      justify-content: center;
      font-size: 0.8125rem;
    }

    .wave-add-delete-row .legend-add-btn svg,
    .wave-add-delete-row .wave-delete-signal-btn svg,
    .wave-move-row .wave-move-signal-btn svg {
      width: 16px;
      height: 16px;
    }

    .wave-move-row .wave-move-signal-btn {
      border-radius: 8px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-muted);
    }

    .wave-move-row .wave-move-signal-btn:not(:disabled):hover {
      border-color: var(--accent);
      background: var(--border);
      color: var(--text);
    }

    .wave-mode-delete-row .wave-edit-mode-btn {
      flex: 1.35 1 0;
    }

    .wave-edit-mode-btn {
      border-radius: 8px;
      justify-content: center;
      font-weight: 600;
      border: 1px solid var(--border);
      transition: background 0.15s, border-color 0.15s, color 0.15s, filter 0.15s;
    }

    .wave-edit-mode-btn svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .wave-edit-mode-btn.mode-modify {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .wave-edit-mode-btn.mode-insert {
      background: #0d9488;
      border-color: #0d9488;
      color: #fff;
    }

    .wave-edit-mode-btn:hover {
      filter: brightness(1.1);
    }

    .wave-delete-col-btn,
    .wave-delete-signal-btn {
      border-radius: 8px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-muted);
    }

    .wave-delete-signal-btn:not(:disabled) {
      border-color: rgba(229, 83, 75, 0.45);
      color: #f0b0ab;
    }

    .wave-delete-col-btn:not(:disabled):hover,
    .wave-delete-signal-btn:not(:disabled):hover {
      border-color: #e5534b;
      background: rgba(229, 83, 75, 0.12);
      color: #f0b0ab;
    }

    .legend-list {
      padding: 0 12px 8px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .legend-item {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 5px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .legend-item:hover {
      background: var(--border);
      border-color: var(--accent);
    }

    .legend-item:active { transform: scale(0.98); }

    .legend-item.legend-disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .legend-item.legend-disabled:hover {
      background: var(--surface-2);
      border-color: var(--border);
    }

    .legend-item.legend-disabled:active { transform: none; }

    .legend-label {
      font-size: 0.62rem;
      font-weight: 500;
      margin-bottom: 2px;
      color: var(--text);
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .legend-desc {
      display: none;
    }

    .legend-wave {
      background: #fff;
      border-radius: 3px;
      padding: 1px 2px;
      overflow: hidden;
    }

    .legend-wave svg {
      display: block;
      max-width: 100%;
      height: auto;
      max-height: 22px;
    }

    .legend-char-badge {
      display: inline-block;
      font-family: var(--editor-font);
      font-size: 0.58rem;
      padding: 0 3px;
      border-radius: 3px;
      background: var(--bg);
      color: var(--accent);
      margin-left: 3px;
      vertical-align: middle;
    }

    /* Connection relations — max 5 visible rows, scroll beyond */
    .connection-list,
    .connection-edge-list {
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: rgba(148, 163, 184, 0.35) transparent;
    }

    .connection-list::-webkit-scrollbar,
    .connection-edge-list::-webkit-scrollbar {
      width: 6px;
    }

    .connection-list::-webkit-scrollbar-track,
    .connection-edge-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .connection-list::-webkit-scrollbar-thumb,
    .connection-edge-list::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.35);
      border-radius: 3px;
    }

    .connection-list::-webkit-scrollbar-thumb:hover,
    .connection-edge-list::-webkit-scrollbar-thumb:hover {
      background: rgba(148, 163, 184, 0.55);
    }

    .connection-list {
      padding: 0 12px 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 224px; /* 5 × 40px rows + 4 × 6px gaps */
    }

    .connection-item {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 8px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .connection-item:hover {
      background: var(--border);
      border-color: var(--accent);
    }

    .connection-item:active { transform: scale(0.99); }

    .connection-item.disabled {
      opacity: 0.45;
      cursor: not-allowed;
      pointer-events: none;
    }

    .connection-item.disabled:hover {
      background: var(--surface-2);
      border-color: var(--border);
    }

    .connection-item.disabled:active { transform: none; }

    .connection-item.preset-matches-selected {
      border-color: var(--accent);
      background: rgba(59, 130, 246, 0.12);
      box-shadow: 0 0 0 1px var(--accent);
    }

    .connection-item.preset-matches-selected:hover {
      background: rgba(59, 130, 246, 0.18);
      border-color: var(--accent);
    }

    .connection-label {
      flex-shrink: 0;
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--text);
      min-width: 4.5em;
    }

    .connection-syntax {
      flex-shrink: 0;
      font-family: var(--editor-font);
      font-size: 0.62rem;
      color: var(--accent);
      background: var(--bg);
      padding: 2px 5px;
      border-radius: 3px;
    }

    .connection-preview {
      flex: 1;
      min-width: 0;
      background: #fff;
      border-radius: 3px;
      padding: 1px 2px;
      overflow: hidden;
    }

    .connection-preview svg {
      display: block;
      max-width: 100%;
      height: auto;
      max-height: 28px;
    }

    .connection-edge-section {
      padding: 4px 12px 10px;
      border-top: 1px solid var(--border);
      margin-top: 4px;
    }

    .connection-edge-title {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .connection-edge-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 176px; /* 5 × 32px rows + 4 × 4px gaps */
    }

    .connection-edge-row {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 6px 4px 8px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .connection-edge-row:hover {
      border-color: var(--accent);
    }

    .connection-edge-row.selected {
      border-color: var(--accent);
      background: rgba(59, 130, 246, 0.12);
      box-shadow: 0 0 0 1px var(--accent);
    }

    .connection-edge-text {
      flex: 1;
      min-width: 0;
      font-family: var(--editor-font);
      font-size: 0.68rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
    }

    .connection-edge-text:hover {
      color: var(--accent);
    }

    .connection-edge-delete {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      border: none;
      border-radius: 4px;
      background: transparent;
      color: var(--text-muted);
      font-size: 1rem;
      line-height: 1;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .connection-edge-delete:hover {
      background: rgba(239, 68, 68, 0.15);
      color: var(--error);
    }

    .connection-edge-empty {
      font-size: 0.68rem;
      color: var(--text-muted);
      padding: 2px 0;
    }

    .connection-label-edit {
      padding: 6px 12px 8px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .connection-label-edit[hidden] {
      display: none;
    }

    .connection-label-edit-label {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }

    .connection-label-edit-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .connection-label-edit-row input {
      flex: 1;
      min-width: 0;
      padding: 4px 8px;
      font-size: 0.72rem;
      font-family: var(--editor-font);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
    }

    .connection-label-edit-row input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .connection-label-edit-row button {
      flex-shrink: 0;
      padding: 4px 10px;
      font-size: 0.68rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .connection-label-edit-row button:hover {
      opacity: 0.9;
    }

    .connection-label-edit-hint {
      font-size: 0.62rem;
      color: var(--text-muted);
    }

    .wave-edge-interactive {
      cursor: pointer;
    }

    .wave-edge-selected path,
    .wave-edge-selected line,
    .wave-edge-selected polyline {
      stroke: var(--accent) !important;
      stroke-width: 2.5 !important;
    }

    @keyframes waveEdgeLabelBlink {
      0%, 45% { visibility: visible; opacity: 1; }
      50%, 95% { visibility: hidden; opacity: 0; }
      100% { visibility: visible; opacity: 1; }
    }

    @keyframes waveEdgePathBlink {
      0%, 45% { opacity: 1; }
      50%, 95% { opacity: 0.12; }
      100% { opacity: 1; }
    }

    .wave-edge-label-blink {
      animation: waveEdgeLabelBlink 1.2s step-end infinite;
    }

    .wave-edge-blink path,
    .wave-edge-blink line,
    .wave-edge-blink polyline {
      animation: waveEdgePathBlink 1.2s step-end infinite;
    }

    /* Main content */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      position: relative;
    }

    .wave-panel {
      flex: 1;
      min-height: 0;
      background: #ffffff;
      overflow: auto;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px;
      position: relative;
    }

    .wave-panel .wave-container {
      width: 100%;
      max-width: 100%;
      position: relative;
    }

    .wave-container.rendering {
      opacity: 0.55;
      pointer-events: none;
      transition: opacity 0.15s ease;
    }

    .wave-container.rendering::after {
      content: '波形更新中…';
      position: absolute;
      top: 12px;
      right: 12px;
      font-size: 0.75rem;
      color: var(--text-muted, #64748b);
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      pointer-events: none;
      z-index: 2;
    }

    .wave-error {
      color: var(--error);
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 16px 20px;
      font-family: var(--editor-font);
      font-size: 0.875rem;
      max-width: 600px;
    }

    .editor-panel {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      border-top: 2px solid var(--border);
    }

    .editor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .editor-header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .editor-copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface-2);
      color: var(--text);
      font-size: 0.72rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .editor-copy-btn:hover {
      background: var(--border);
      border-color: var(--accent);
    }

    .editor-copy-btn:active {
      background: var(--surface);
    }

    .editor-copy-btn.copied {
      border-color: var(--success);
      color: var(--success);
    }

    .editor-copy-btn svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      opacity: 0.9;
    }

    /* Save tag modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 2000;
      background: rgba(0, 0, 0, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .modal-overlay[hidden] { display: none; }

    .modal-dialog {
      width: min(100%, 360px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
      overflow: hidden;
    }

    .modal-header {
      padding: 14px 16px 10px;
      font-size: 0.9rem;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
    }

    .modal-body {
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .modal-radio {
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 0.8125rem;
      color: var(--text);
      cursor: pointer;
    }

    .modal-radio > span,
    .modal-radio > input[type="radio"] {
      cursor: pointer;
    }

    .modal-radio-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .modal-radio-control {
      margin-left: 24px;
    }

    .modal-select,
    .modal-input {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface-2);
      color: var(--text);
      font-size: 0.8125rem;
      font-family: var(--editor-font);
    }

    .modal-select:focus,
    .modal-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .modal-select:disabled,
    .modal-input:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .modal-hint {
      font-size: 0.72rem;
      color: var(--error);
      min-height: 1em;
    }

    .modal-duplicate-confirm p {
      font-size: 0.875rem;
      line-height: 1.5;
      color: var(--text);
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 10px 16px 14px;
      border-top: 1px solid var(--border);
    }

    .modal-btn {
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface-2);
      color: var(--text);
      font-size: 0.8125rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .modal-btn:hover {
      background: var(--border);
    }

    .modal-btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .modal-btn-primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    /* Saved tags sidebar */
    .saved-tags-list {
      padding: 0 12px 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .saved-tag-row {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 6px 6px 10px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .saved-tag-row:hover {
      border-color: var(--accent);
    }

    .saved-tag-row.active {
      border-color: var(--accent);
      background: rgba(59, 130, 246, 0.12);
      box-shadow: 0 0 0 1px var(--accent);
    }

    .saved-tag-name {
      flex: 1;
      min-width: 0;
      font-size: 0.8125rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .saved-tag-meta {
      flex-shrink: 0;
      font-size: 0.62rem;
      color: var(--text-muted);
    }

    .saved-tag-delete {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      border: none;
      border-radius: 4px;
      background: transparent;
      color: var(--text-muted);
      font-size: 1rem;
      line-height: 1;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s, background 0.15s, color 0.15s;
    }

    .saved-tag-row:hover .saved-tag-delete {
      opacity: 1;
    }

    .saved-tag-delete:hover {
      background: rgba(239, 68, 68, 0.15);
      color: var(--error);
    }

    .saved-tags-empty {
      padding: 4px 16px 10px;
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    .editor-status {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
    }

    .status-dot.error { background: var(--error); }

    .editor-wrapper {
      flex: 1;
      display: flex;
      min-height: 0;
      background: var(--line-num-bg);
    }

    .line-numbers {
      width: 48px;
      min-width: 48px;
      padding: 12px 8px;
      text-align: right;
      font-family: var(--editor-font);
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-muted);
      overflow: hidden;
      user-select: none;
      border-right: 1px solid var(--border);
      background: var(--line-num-bg);
    }

    .line-numbers span {
      display: block;
    }

    .code-editor {
      flex: 1;
      width: 100%;
      padding: 12px 16px;
      border: none;
      outline: none;
      resize: none;
      background: #0d1117;
      color: #c9d1d9;
      font-family: var(--editor-font);
      font-size: 13px;
      line-height: 1.6;
      tab-size: 2;
      overflow: auto;
      white-space: pre;
    }

    /* Reading mode */
    .app.reading-mode .sidebar,
    .app.reading-mode .editor-panel {
      display: none;
    }

    .app.reading-mode .wave-panel {
      flex: 1;
    }

    .back-btn {
      display: none;
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 100;
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      cursor: grab;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      transition: background 0.15s;
      touch-action: none;
      user-select: none;
    }

    .back-btn:hover { background: var(--surface-2); }
    .back-btn.dragging { cursor: grabbing; opacity: 0.92; }

    .app.reading-mode .back-btn {
      display: flex;
    }

    .back-btn svg {
      width: 22px;
      height: 22px;
      pointer-events: none;
    }

    .wave-lane-interactive {
      cursor: pointer;
    }

    .wave-lane-interactive:hover > rect.lane-hover-bg {
      fill: rgba(59, 130, 246, 0.08);
    }

    .wave-lane-interactive.wave-lane-selected > rect.lane-hover-bg {
      fill: rgba(59, 130, 246, 0.14);
      stroke: rgba(59, 130, 246, 0.55);
      stroke-width: 1;
    }

    .wave-col-highlight {
      fill: rgba(59, 130, 246, 0.22);
      stroke: rgba(59, 130, 246, 0.75);
      stroke-width: 1.5;
      pointer-events: none;
    }

    .wave-col-highlight-from {
      fill: rgba(34, 197, 94, 0.22);
      stroke: rgba(34, 197, 94, 0.85);
      stroke-width: 1.5;
      pointer-events: none;
    }

    .wave-col-highlight-to {
      fill: rgba(249, 115, 22, 0.22);
      stroke: rgba(249, 115, 22, 0.85);
      stroke-width: 1.5;
      pointer-events: none;
    }

    .connection-pick-toggle {
      display: flex;
      gap: 4px;
      padding: 0 12px 6px;
    }

    .connection-pick-toggle button {
      flex: 1;
      padding: 5px 8px;
      font-size: 0.72rem;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--surface-2);
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .connection-pick-toggle button.active {
      background: rgba(34, 197, 94, 0.15);
      border-color: rgba(34, 197, 94, 0.6);
      color: var(--success);
    }

    .connection-point-status {
      padding: 0 12px 8px;
      font-size: 0.68rem;
      color: var(--text-muted);
      line-height: 1.45;
    }

    .connection-point-status .pt-from { color: var(--success); }
    .connection-point-status .pt-to { color: #f97316; }

    .wave-lane-interactive text.info,
    .wave-lane-interactive .wave-name-click-zone,
    .wave-lane-interactive .wave-data-text,
    .wave-headfoot-text {
      cursor: text;
    }

    .wave-lane-interactive .wave-name-click-zone:hover {
      fill: rgba(0, 65, 196, 0.06);
    }

    .wave-headfoot-text:hover {
      fill: #0041c4;
      text-decoration: underline;
    }

    .wave-text-edit-overlay {
      position: absolute;
      z-index: 50;
      min-width: 40px;
      padding: 2px 6px;
      border: 2px solid var(--accent);
      border-radius: 4px;
      background: #fff;
      color: #111;
      font-family: var(--editor-font);
      font-size: 13px;
      outline: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    /* Responsive */
    @media (max-width: 768px) {
      :root { --sidebar-width: 180px; }
      .menu-btn .shortcut { display: none; }
      .wave-add-delete-row,
      .wave-move-row,
      .wave-mode-delete-row { gap: 4px; }
      .wave-add-delete-row .legend-add-btn,
      .wave-add-delete-row .wave-delete-signal-btn,
      .wave-move-row .wave-move-signal-btn,
      .wave-mode-delete-row .wave-edit-mode-btn,
      .wave-mode-delete-row .wave-delete-col-btn {
        padding: 7px 4px;
        font-size: 0.6875rem;
        gap: 4px;
      }
      .wave-add-delete-row .legend-add-btn svg,
      .wave-add-delete-row .wave-delete-signal-btn svg,
      .wave-move-row .wave-move-signal-btn svg,
      .wave-mode-delete-row .wave-edit-mode-btn svg,
      .wave-mode-delete-row .wave-delete-col-btn svg {
        width: 14px;
        height: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1>VisualWaveDrom</h1>
        <p>波形可视化编辑器</p>
      </div>

      <!-- Function Menu -->
      <div class="menu-section">
        <div class="menu-section-title">功能菜单</div>
        <button class="menu-btn" id="btn-reading-mode" title="阅读模式">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          阅读模式
        </button>
        <button class="menu-btn" id="btn-undo" title="撤销 (Ctrl+Z)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
          </svg>
          撤销
          <span class="shortcut">Ctrl+Z</span>
        </button>
        <button class="menu-btn" id="btn-redo" title="重做 (Ctrl+Shift+Z)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.13-9.36L23 10"/>
          </svg>
          重做
          <span class="shortcut">Ctrl+Shift+Z</span>
        </button>
        <div class="menu-control-row">
          <label class="menu-control-label" for="input-hscale">水平缩放</label>
          <input type="number" id="input-hscale" class="menu-control-input"
            min="0.1" max="20" step="0.1" value="1"
            title="config.hscale（0.1–20，支持小数，Enter 或失焦应用）">
        </div>
      </div>

      <!-- Waveform Menu -->
      <div class="menu-section">
        <div class="menu-section-title">波形菜单</div>
        <div class="wave-add-delete-row">
          <button class="menu-btn legend-add-btn" id="btn-add-signal" type="button" title="在 signal 数组末尾插入新信号行">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            新增行
          </button>
          <button class="menu-btn wave-delete-signal-btn" id="btn-delete-signal" type="button" disabled title="请先在波形区点击选中一行">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
              <path d="M10 11v6M14 11v6"/>
              <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
            </svg>
            删除行
          </button>
        </div>
        <div class="wave-move-row">
          <button class="menu-btn wave-move-signal-btn" id="btn-move-signal-up" type="button" disabled title="请先在波形区点击选中一行">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <polyline points="18 15 12 9 6 15"/>
            </svg>
            行上移
          </button>
          <button class="menu-btn wave-move-signal-btn" id="btn-move-signal-down" type="button" disabled title="请先在波形区点击选中一行">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
            行下移
          </button>

    function escapeRegex(str) {
      return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function flattenSignals(signals, result) {
      if (!Array.isArray(signals)) return result || [];
      const out = result || [];
      signals.forEach((sig) => {
        if (!sig || typeof sig !== 'object') return;
        if (sig.wave !== undefined && sig.name !== undefined) {
          out.push(sig);
        }
        if (Array.isArray(sig.children)) {
          flattenSignals(sig.children, out);
        }
      });
      return out;
    }

    function findObjectStart(text, pos) {
      let i = pos;
      while (i >= 0 && text[i] !== '{') i--;
      return i >= 0 ? i : pos;
    }

    function findObjectEnd(text, start) {
      let depth = 0;
      let inString = false;
      let escape = false;
      for (let i = start; i < text.length; i++) {
        const c = text[i];
        if (inString) {
          if (escape) escape = false;
          else if (c === '\\') escape = true;
          else if (c === '"') inString = false;
          continue;
        }
        if (c === '"') { inString = true; continue; }
        if (c === '{') depth++;
        if (c === '}') {
          depth--;
          if (depth === 0) return i + 1;
        }
      }
      return text.length;
    }

    function buildSignalSourceMap(jsonText) {
      let parsed;
      try {
        parsed = JSON.parse(jsonText);
      } catch (e) {
        return [];
      }
      const flat = flattenSignals(parsed.signal || []);
      const map = [];
      let searchStart = 0;
      const signalKeyMatch = jsonText.match(/"signal"\s*:\s*\[/);
      if (signalKeyMatch) searchStart = signalKeyMatch.index;

      flat.forEach((signal) => {
        const nameJson = JSON.stringify(signal.name);
        const waveJson = JSON.stringify(signal.wave);
        const slice = jsonText.slice(searchStart);
        // Match name + wave together so empty names ("" / "") never alias another row.
        const compositeRe = new RegExp(
          '"name"\\s*:\\s*' + escapeRegex(nameJson)
          + '\\s*,\\s*"wave"\\s*:\\s*' + escapeRegex(waveJson)
        );
        let m = compositeRe.exec(slice);
        if (!m) {
          const nameRe = new RegExp('"name"\\s*:\\s*' + escapeRegex(nameJson));
          m = nameRe.exec(slice);
        }
        if (!m) return;
        const nameAbs = searchStart + m.index;
        const objStart = findObjectStart(jsonText, nameAbs);
        const objEnd = findObjectEnd(jsonText, objStart);
        map.push({ start: objStart, end: objEnd, signal });
        searchStart = objEnd;
      });
      return map;
    }

    function getIndentAt(text, pos) {
      const lineStart = text.lastIndexOf('\n', pos - 1) + 1;
      const line = text.slice(lineStart, pos);
      const m = line.match(/^(\s*)/);
      return m ? m[1] : '    ';
    }

    function formatSignalObject(sig, baseIndent) {
      const indent = baseIndent || '    ';
      const inner = indent + '  ';
      const lines = [indent + '{'];
      lines.push(inner + '"name": ' + JSON.stringify(sig.name) + ',');
      lines.push(inner + '"wave": ' + JSON.stringify(sig.wave));
      if (sig.data && sig.data.length) {
        lines[lines.length - 1] += ',';
        lines.push(inner + '"data": ' + JSON.stringify(sig.data));
      }
      if (sig.node !== undefined && sig.node !== '') {
        lines[lines.length - 1] += ',';
        const waveLen = (sig.wave || '').length;
        const nodeStr = padNodeToWaveLength(sig.node, waveLen);
        lines.push(inner + '"node": ' + JSON.stringify(nodeStr));
      }
      if (sig.phase !== undefined) {
        lines[lines.length - 1] += ',';
        lines.push(inner + '"phase": ' + sig.phase);
      }
      lines.push(indent + '}');
      return lines.join('\n');
    }

    function findSignalContextAtCursor(text, cursorPos) {
      const map = buildSignalSourceMap(text);
      return map.find(entry => cursorPos >= entry.start && cursorPos <= entry.end) || null;
    }

    function findTopLevelKeyBlock(text, key) {
      const re = new RegExp('"' + key + '"\\s*:\\s*\\{');
      const m = text.match(re);
      if (!m) return null;
      const objStart = m.index + m[0].lastIndexOf('{');
      const objEnd = findObjectEnd(text, objStart);
      return { start: objStart, end: objEnd };
    }

    function findJsonValueEnd(text, start) {
      const c = text[start];
      if (c === '"') {
        let i = start + 1;
        let escape = false;
        while (i < text.length) {
          if (escape) { escape = false; i++; continue; }
          if (text[i] === '\\') { escape = true; i++; continue; }
          if (text[i] === '"') return i + 1;
          i++;
        }
        return text.length;
      }
      if (c === '[') {
        let depth = 0;
        let inString = false;
        let escape = false;
        for (let i = start; i < text.length; i++) {
          const ch = text[i];
          if (inString) {
            if (escape) escape = false;
            else if (ch === '\\') escape = true;
            else if (ch === '"') inString = false;
            continue;
          }
          if (ch === '"') { inString = true; continue; }
          if (ch === '[') depth++;
          if (ch === ']') {
            depth--;
            if (depth === 0) return i + 1;
          }
        }
        return text.length;
      }
      if (c === '{') return findObjectEnd(text, start);
      let i = start;
      while (i < text.length && !/[\s,}]/.test(text[i])) i++;
      return i;
    }

    function flattenWaveText(node) {
      if (node == null) return '';
      if (typeof node === 'string') return node;
      if (Array.isArray(node)) {
        if (node.length > 0 && node[0] === 'tspan') {
          return node.slice(1).map(flattenWaveText).join('');
        }
        return node.map(flattenWaveText).join('');
      }
      return String(node);
    }

    function getHeadFootOldValue(parsed, field) {
      const block = parsed[field];
      if (!block || block.text === undefined) return '';
      return flattenWaveText(block.text);
    }

    function replaceHeadFootTextInSource(text, field, newValue) {
      const block = findTopLevelKeyBlock(text, field);
      if (!block) return text;
      const slice = text.slice(block.start, block.end);
      const textKeyRe = /"text"\s*:\s*/;
      const tm = slice.match(textKeyRe);
      if (!tm) return text;
      const valueStart = block.start + tm.index + tm[0].length;
      const valueEnd = findJsonValueEnd(text, valueStart);
      return text.slice(0, valueStart) + JSON.stringify(newValue) + text.slice(valueEnd);
    }

    function scrollEditorToHeadFoot(field) {
      if (app.classList.contains('reading-mode')) return;
      const block = findTopLevelKeyBlock(editor.value, field);
      if (!block) return;
      editor.focus();
      editor.selectionStart = block.start;
      editor.selectionEnd = block.end;
      const before = editor.value.slice(0, block.start);
      const line = before.split('\n').length;
      const lineHeight = 13 * 1.6;
      editor.scrollTop = Math.max(0, (line - 3) * lineHeight);
      syncLineNumberScroll();
    }

    function findSignalArrayBounds(text) {
      const match = text.match(/"signal"\s*:\s*\[/);
      if (!match) return null;
      const arrStart = match.index + match[0].length;
      let depth = 1;
      let inString = false;
      let escape = false;
      for (let i = arrStart; i < text.length; i++) {
        const c = text[i];
        if (inString) {
          if (escape) escape = false;
          else if (c === '\\') escape = true;
          else if (c === '"') inString = false;
          continue;
        }
        if (c === '"') { inString = true; continue; }
        if (c === '[') depth++;
        if (c === ']') {
          depth--;
          if (depth === 0) return { arrStart, arrEnd: i, insertBefore: i };
        }
      }
      return null;
    }

    function isValidJsonText(text) {
      if (text == null || !String(text).trim()) return false;
      try {
        JSON.parse(text);
        return true;
      } catch (e) {
        return false;
      }
    }

    function saveEditorJsonToStorage(text) {
      try {
        localStorage.setItem(EDITOR_JSON_KEY, text);
        if (isValidJsonText(text)) {
          localStorage.setItem(EDITOR_JSON_VALID_KEY, text);
        }
      } catch (e) { /* quota / private mode */ }
    }

    function flushPersistEditorJson() {
      clearTimeout(persistTimer);
      persistTimer = null;
      saveEditorJsonToStorage(editor.value);
    }

    function debouncedPersistEditorJson() {
      clearTimeout(persistTimer);
      persistTimer = setTimeout(flushPersistEditorJson, PERSIST_DEBOUNCE_MS);
    }

    function loadEditorJsonFromStorage() {
      try {
        const saved = localStorage.getItem(EDITOR_JSON_KEY);
        if (saved != null && saved !== '') {
          if (isValidJsonText(saved)) return saved;
          const lastValid = localStorage.getItem(EDITOR_JSON_VALID_KEY);
          if (lastValid && isValidJsonText(lastValid)) return lastValid;
          return saved;
        }
      } catch (e) { /* ignore */ }
      return DEFAULT_JSON;
    }

    function migrateSessionStorageToLocal(key) {
      try {
        if (localStorage.getItem(key) == null) {
          const fromSession = sessionStorage.getItem(key);
          if (fromSession != null) {
            localStorage.setItem(key, fromSession);
            sessionStorage.removeItem(key);
          }
        }
      } catch (e) { /* ignore */ }
    }

    function applyEditorChange(newText, selStart, selEnd, options) {
      const opts = options || {};
      editor.value = newText;
      lastSavedContent = newText;
      editor.selectionStart = selStart;
      editor.selectionEnd = selEnd ?? selStart;
      if (!opts.skipFocus) {
        editor.focus();
      }
      updateLineNumbers();
      syncLineNumberScroll();
      if (opts.deferRender) {
        renderConnectionEdgeList();
        scheduleRenderWaveform(newText, opts.onRenderComplete);
      } else {
        renderWaveform(newText);
      }
      if (opts.skipSyncPersist) {
        debouncedPersistEditorJson();
      } else {
        saveEditorJsonToStorage(newText);
      }
    }

    function normalizeHscale(n) {
      return Math.round(n * 100) / 100;
    }

    function hscaleEqual(a, b) {
      return Math.abs(a - b) < HSCALE_EPS;
    }

    function formatHscaleValue(n) {
      const normalized = normalizeHscale(n);
      return Number.isInteger(normalized) ? String(normalized) : String(normalized);
    }

    function clampHscale(value) {
      let n = typeof value === 'number' ? value : parseFloat(String(value).trim());
      if (!Number.isFinite(n)) n = 1;
      return normalizeHscale(Math.min(HSCALE_MAX, Math.max(HSCALE_MIN, n)));
    }

    function readHscaleFromSource(source) {
      const h = source && source.config && source.config.hscale;
      if (typeof h === 'number' && Number.isFinite(h) && h > 0) return clampHscale(h);
      return 1;
    }

    function readHscaleFromJsonText(jsonText) {
      try {
        return readHscaleFromSource(JSON.parse(jsonText));
      } catch (e) {
        return 1;
      }
    }

    function getWaveUnitWidth(jsonText) {
      return WAVE_UNIT_WIDTH * readHscaleFromJsonText(jsonText);
    }

    function updateHscaleInSource(text, newHscale) {
      const h = clampHscale(newHscale);
      try {
        JSON.parse(text);
      } catch (e) {
        return null;
      }

      const block = findTopLevelKeyBlock(text, 'config');
      if (block) {
        const slice = text.slice(block.start, block.end);
        const hscaleRe = /"hscale"\s*:\s*-?[\d.]+/;
        const m = slice.match(hscaleRe);
        if (m) {
          const abs = block.start + m.index;
          return text.slice(0, abs) + '"hscale": ' + h + text.slice(abs + m[0].length);
        }
        const configIndent = getIndentAt(text, block.start);
        const propIndent = configIndent + '  ';
        const insertBefore = block.end - 1;
        const inner = text.slice(block.start + 1, block.end - 1).trim();
        const prefix = inner ? ',\n' + propIndent : '\n' + propIndent;
        const insertion = prefix + '"hscale": ' + h + '\n' + configIndent;
        return text.slice(0, insertBefore) + insertion + text.slice(insertBefore);
      }

      const rootClose = text.lastIndexOf('}');
      if (rootClose < 0) return null;
      const rootIndent = getIndentAt(text, rootClose) || '  ';
      const beforeClose = text.slice(0, rootClose).replace(/\s*$/, '');
      const hasContent = /"\w+"\s*:/.test(beforeClose);
      const insertion = (hasContent ? ',\n' : '\n') + rootIndent + '"config": { "hscale": ' + h + ' }\n';
      return beforeClose + insertion + text.slice(rootClose);
    }

    function syncHscaleInputFromJson(jsonText) {
      if (!hscaleInput) return;
      const h = readHscaleFromJsonText(jsonText);
      const current = parseFloat(hscaleInput.value);
      if (Number.isFinite(current) && hscaleEqual(current, h)) return;
      isUpdatingHscaleFromJson = true;
      hscaleInput.value = formatHscaleValue(h);
      isUpdatingHscaleFromJson = false;
    }

    function applyHscaleFromInput() {
      if (isUpdatingHscaleFromJson || !hscaleInput) return;
      const newH = clampHscale(hscaleInput.value);
      hscaleInput.value = formatHscaleValue(newH);
      const current = readHscaleFromJsonText(editor.value);
      if (hscaleEqual(newH, current)) return;

      const newText = updateHscaleInSource(editor.value, newH);
      if (!newText || newText === editor.value) {
        setStatus(false, 'JSON 错误，无法更新 hscale');
        return;
      }

      pushUndoBeforeChange();
      applyEditorChange(newText, editor.selectionStart, editor.selectionEnd);
    }

    function flushUndoDebounce() {
      clearTimeout(saveTimer);
      saveTimer = null;
    }

    function finalizeUndoBurst() {
      if (isApplyingHistory) return;
      lastSavedContent = editor.value;
      undoBurstCaptured = false;
    }

    function captureUndoIfNeeded() {
      if (isApplyingHistory) return;
      if (undoBurstCaptured || editor.value === lastSavedContent) return;
      undoStack.push(lastSavedContent);
      if (undoStack.length > 100) undoStack.shift();
      redoStack = [];
      undoBurstCaptured = true;
      updateUndoRedoButtons();
    }

    function pushUndoBeforeChange() {
      if (isApplyingHistory) return;
      flushUndoDebounce();
      if (undoBurstCaptured) {
        lastSavedContent = editor.value;
        undoBurstCaptured = false;
      }
      undoStack.push(editor.value);
      if (undoStack.length > 100) undoStack.shift();
      redoStack = [];
      lastSavedContent = editor.value;
      updateUndoRedoButtons();
    }

    function replaceFieldInSource(text, entry, field, newValue, dataIdx) {
      const slice = text.slice(entry.start, entry.end);
      if (field === 'name') {
        const re = /"name"\s*:\s*"([^"\\]|\\.)*"/;
        const m = slice.match(re);
        if (!m) return text;
        const abs = entry.start + m.index;
        return text.slice(0, abs) + '"name": ' + JSON.stringify(newValue) + text.slice(abs + m[0].length);
      }
      if (field === 'wave') {
        const re = /"wave"\s*:\s*"([^"\\]|\\.)*"/;
        const m = slice.match(re);
        if (!m) return text;
        const abs = entry.start + m.index;
        return text.slice(0, abs) + '"wave": ' + JSON.stringify(newValue) + text.slice(abs + m[0].length);
      }
      if (field === 'data') {
        const re = /"data"\s*:\s*\[[^\]]*\]/;
        const m = slice.match(re);
        let dataArr = entry.signal.data ? entry.signal.data.slice() : [];
        while (dataArr.length <= dataIdx) dataArr.push('');
        dataArr[dataIdx] = newValue;
        if (m) {
          const abs = entry.start + m.index;
          return text.slice(0, abs) + '"data": ' + JSON.stringify(dataArr) + text.slice(abs + m[0].length);
        }
        const waveRe = /"wave"\s*:\s*"([^"\\]|\\.)*"/;
        const wm = slice.match(waveRe);
        if (!wm) return text;
        const abs = entry.start + wm.index + wm[0].length;
        const inner = getIndentAt(text, entry.start) + '  ';
        return text.slice(0, abs) + ',\n' + inner + '"data": ' + JSON.stringify(dataArr) + text.slice(abs);
      }
      return text;
    }

    function applyWaveTemplateToSignal(existing, template) {
      const merged = Object.assign({}, existing, { wave: template.wave });
      if (template.data) merged.data = template.data.slice();
      else delete merged.data;
      return merged;
    }

    function getUseTranslateX(useEl) {
      const x = useEl.getAttribute('x');
      if (x != null && x !== '') return parseFloat(x) || 0;
      const tr = useEl.getAttribute('transform') || '';
      const m = tr.match(/translate\(\s*([\d.+-]+)/);
      return m ? parseFloat(m[1]) : 0;
    }

    function getDrawUses(drawGroup) {
      return [...drawGroup.querySelectorAll('use')]
        .sort((a, b) => getUseTranslateX(a) - getUseTranslateX(b));
    }

    function getEffectiveWaveChar(wave, index) {
      let eff = 'x';
      for (let i = 0; i <= index; i++) {
        if (wave[i] !== '.') eff = wave[i];
      }
      return eff;
    }

    function reserveUsesForChar(wave, index) {
      const raw = wave[index];
      const eff = raw === '.' ? getEffectiveWaveChar(wave, index) : raw;
      if (eff === '|') {
        const prevEff = index > 0 ? getEffectiveWaveChar(wave, index - 1) : 'x';
        if (prevEff === 'p' || prevEff === 'n') return 0;
        return 2;
      }
      if (eff === 'p' || eff === 'n') return 2;
      return 2;
    }

    function allocateUsesToWaveChars(wave, useCount) {
      const n = wave.length;
      if (n === 0) return [];
      const alloc = new Array(n).fill(0);
      let ui = 0;

      for (let i = 0; i < n; i++) {
        const usesLeft = useCount - ui;
        if (usesLeft <= 0) break;

        let take = reserveUsesForChar(wave, i);
        const remainingChars = n - i - 1;

        if (i === n - 1) {
          take = usesLeft;
        } else {
          let reserve = 0;
          for (let j = i + 1; j < n; j++) {
            reserve += reserveUsesForChar(wave, j);
          }
          if (reserve > usesLeft) reserve = remainingChars * 2;
          take = Math.min(Math.max(take, 0), Math.max(0, usesLeft - reserve));
          if (take === 0 && usesLeft > 0) {
            take = Math.max(1, Math.floor(usesLeft / (remainingChars + 1)));
          }
        }

        alloc[i] = take;
        ui += take;
      }

      if (ui < useCount) alloc[n - 1] += useCount - ui;
      if (ui > useCount) {
        let excess = ui - useCount;
        for (let i = n - 1; i >= 0 && excess > 0; i--) {
          const drop = Math.min(alloc[i], excess);
          alloc[i] -= drop;
          excess -= drop;
        }
      }
      return alloc;
    }

    function getDrawGroupContentWidth(drawGroup, unitWidth) {
      const step = unitWidth || WAVE_UNIT_WIDTH;
      try {
        const bbox = drawGroup.getBBox();
        if (bbox.width > step * 0.25) return bbox.width;
      } catch (e) { /* ignore */ }
      try {
        const lane = drawGroup.closest('[id^="wavelane_"]');
        if (lane) {
          const laneBbox = lane.getBBox();
          const drawBbox = drawGroup.getBBox();
          const nameWidth = drawBbox.x - laneBbox.x;
          const contentWidth = laneBbox.width - nameWidth;
          if (contentWidth > step * 0.25) return contentWidth;
        }
      } catch (e) { /* ignore */ }
      return step * 8;
    }

    function buildVirtualColumnMap(numCols, unitWidth) {
      const step = unitWidth || WAVE_UNIT_WIDTH;
      const cols = [];
      for (let i = 0; i < numCols; i++) {
        cols.push({ charIndex: i, char: '', x0: i * step, x1: (i + 1) * step });
      }
      return cols;
    }

    function columnIndexFromLocalX(localX, unitWidth) {
      const step = unitWidth || WAVE_UNIT_WIDTH;
      if (localX < 0) return 0;
      return Math.floor(localX / step);
    }

    function buildWaveColumnMap(drawGroup, wave, unitWidth) {
      const step = unitWidth || WAVE_UNIT_WIDTH;
      const uses = drawGroup ? getDrawUses(drawGroup) : [];
      const n = wave.length;
      if (n === 0) {
        const width = drawGroup ? getDrawGroupContentWidth(drawGroup, unitWidth) : step * 8;
        const numCols = Math.max(1, Math.ceil(width / step));
        return buildVirtualColumnMap(numCols, unitWidth);
      }

      if (uses.length === 0) {
        return [...wave].map((char, i) => ({
          charIndex: i,
          char,
          x0: i * step,
          x1: (i + 1) * step
        }));
      }

      const alloc = allocateUsesToWaveChars(wave, uses.length);
      const cols = [];
      let useIdx = 0;

      for (let i = 0; i < n; i++) {
        const count = alloc[i];
        let x0;
        let x1;
        if (count <= 0) {
          x0 = cols.length ? cols[cols.length - 1].x1 : 0;
          x1 = x0;
        } else {
          x0 = getUseTranslateX(uses[useIdx]);
          const last = uses[useIdx + count - 1];
          x1 = getUseTranslateX(last) + step;
          useIdx += count;
        }
        cols.push({ charIndex: i, char: wave[i], x0, x1 });
      }
      return cols;
    }

    function clampPickColumnIndex(colIndex, wave, cols) {
      const minCol = 0;
      let maxCol = Math.max((wave || '').length, cols.length);
      if (!wave.length && cols.length > 0) {
        maxCol = cols.length;
      } else if (maxCol > 0) {
        maxCol += 1;
      } else {
        maxCol = 8;
      }
      return Math.min(Math.max(minCol, colIndex), maxCol);
    }

    function columnIndexFromClick(drawGroup, wave, svgRoot, clientX, unitWidth) {
      const step = unitWidth || WAVE_UNIT_WIDTH;
      const pt = svgRoot.createSVGPoint();
      pt.x = clientX;
      pt.y = 0;
      const ctm = drawGroup.getScreenCTM();
      if (!ctm) return 0;
      const local = pt.matrixTransform(ctm.inverse());
      const cols = buildWaveColumnMap(drawGroup, wave, unitWidth);
      if (!cols.length) {
        return clampPickColumnIndex(columnIndexFromLocalX(local.x, unitWidth), wave, cols);
      }

      for (const col of cols) {
        if (col.x1 <= col.x0) continue;
        if (local.x >= col.x0 && local.x < col.x1) {
          return clampPickColumnIndex(col.charIndex, wave, cols);
        }
      }

      if (local.x >= cols[cols.length - 1].x1) {
        return clampPickColumnIndex(columnIndexFromLocalX(local.x, unitWidth), wave, cols);
      }

      let best = cols[0].charIndex;
      let bestDist = Infinity;
      cols.forEach((col) => {
        const mid = col.x1 > col.x0 ? (col.x0 + col.x1) / 2 : col.x0;
        const d = Math.abs(local.x - mid);
        if (d < bestDist) {
          bestDist = d;
          best = col.charIndex;
        }
      });
      return clampPickColumnIndex(best, wave, cols);
    }

    function replaceWaveCharAt(wave, colIndex, char) {
      if (colIndex < 0) return wave;
      if (colIndex >= wave.length) return wave + char;
      return wave.slice(0, colIndex) + char + wave.slice(colIndex + 1);
    }

    function insertWaveCharAt(wave, colIndex, char) {
      const pos = colIndex < 0 ? 0 : Math.min(colIndex, wave.length);
      return wave.slice(0, pos) + char + wave.slice(pos);
    }

    function deleteWaveCharAt(wave, colIndex) {
      if (colIndex < 0 || colIndex >= wave.length) return wave;
      return wave.slice(0, colIndex) + wave.slice(colIndex + 1);
    }

    function resolveLegendColumnIndex(wave, forInsert) {
      if (selectedWaveColumnIndex >= 0) return selectedWaveColumnIndex;
      return forInsert ? wave.length : 0;
    }

    function applyWaveCharAtColumn(rowIndex, colIndex, char) {
      if (rowIndex < 0) {
        setStatus(false, '请先在波形区点击选中一行');
        return false;
      }

      let parsed;
      try {
        parsed = JSON.parse(editor.value);
      } catch (e) {
        setStatus(false, 'JSON 错误，无法修改');
        return false;
      }

      const text = editor.value;
      const sourceMap = buildSignalSourceMap(text);
      const entry = sourceMap[rowIndex];
      if (!entry) {
        setStatus(false, '未找到选中的信号');
        setSelectedSignal(rowIndex, -1);
        return false;
      }

      const wave = entry.signal.wave || '';
      const safeCol = colIndex < 0 ? 0 : Math.min(colIndex, Math.max(0, wave.length - 1));
      const atLastColumn = wave.length === 0 || safeCol === wave.length - 1;
      const newWave = atLastColumn
        ? insertWaveCharAt(wave, wave.length, char)
        : replaceWaveCharAt(wave, safeCol, char);
      if (newWave === wave) return false;

      pushUndoBeforeChange();
      const updatedSignal = Object.assign({}, entry.signal, { wave: newWave });
      const indent = getIndentAt(text, entry.start);
      const newObjStr = formatSignalObject(updatedSignal, indent);
      const newText = text.slice(0, entry.start) + newObjStr + text.slice(entry.end);
      const nextCol = atLastColumn
        ? newWave.length - 1
        : (newWave.length > 0 ? Math.min(safeCol + 1, newWave.length - 1) : -1);
      setSelectedSignal(rowIndex, nextCol);
      applyEditorChange(newText, entry.start, entry.start + newObjStr.length);
      if (atLastColumn) {
        setStatus(
          true,
          waveEditModeLabel()
            + ' · 已在末尾新增 ' + updatedSignal.name + ' [' + nextCol + ']=' + JSON.stringify(char)
        );
      } else {
        setStatus(
          true,
          waveEditModeLabel()
            + ' · 已修改 ' + updatedSignal.name + ' [' + safeCol + ']=' + JSON.stringify(char)
            + ' · 当前列 [' + nextCol + ']=' + JSON.stringify(newWave[nextCol] || '')
        );
      }
      return true;
    }

    function applyWaveCharInsertAtColumn(rowIndex, colIndex, char) {
      if (rowIndex < 0) {
        setStatus(false, '请先在波形区点击选中一行');
        return false;
      }

      let parsed;
      try {
        parsed = JSON.parse(editor.value);
      } catch (e) {
        setStatus(false, 'JSON 错误，无法插入');
        return false;
      }

      const text = editor.value;
      const sourceMap = buildSignalSourceMap(text);
      const entry = sourceMap[rowIndex];
      if (!entry) {
        setStatus(false, '未找到选中的信号');
        setSelectedSignal(rowIndex, -1);
        return false;
      }

      const wave = entry.signal.wave || '';
      const insertCol = colIndex < 0 ? wave.length : Math.min(colIndex, wave.length);
      const newWave = insertWaveCharAt(wave, insertCol, char);
      if (newWave === wave) return false;

      pushUndoBeforeChange();
      const updatedSignal = Object.assign({}, entry.signal, { wave: newWave });
      const indent = getIndentAt(text, entry.start);
      const newObjStr = formatSignalObject(updatedSignal, indent);
      const newText = text.slice(0, entry.start) + newObjStr + text.slice(entry.end);
      applyEditorChange(newText, entry.start, entry.start + newObjStr.length);
      setSelectedSignal(rowIndex, insertCol);
      setStatus(true, waveEditModeLabel() + ' · 已插入 ' + updatedSignal.name + ' [' + insertCol + ']=' + JSON.stringify(char));
      return true;
    }

    function deleteWaveCharAtColumn(rowIndex, colIndex) {
      if (rowIndex < 0) {
        setStatus(false, '请先在波形区点击选中一行');
        return false;
      }
      if (colIndex < 0) {
        setStatus(false, '请先选中列');
        return false;
      }

      let parsed;
      try {
        parsed = JSON.parse(editor.value);
      } catch (e) {
        setStatus(false, 'JSON 错误，无法删除');
        return false;
      }

      const text = editor.value;
      const sourceMap = buildSignalSourceMap(text);
      const entry = sourceMap[rowIndex];
      if (!entry) {
        setStatus(false, '未找到选中的信号');
        setSelectedSignal(rowIndex, -1);
        return false;
      }

      const wave = entry.signal.wave || '';
      if (wave.length === 0) {
        setStatus(false, '波形为空，无法删除');
        return false;
      }

      const safeCol = Math.min(colIndex, wave.length - 1);
      const newWave = deleteWaveCharAt(wave, safeCol);
      if (newWave === wave) return false;

      pushUndoBeforeChange();
      const updatedSignal = Object.assign({}, entry.signal, { wave: newWave });
      const indent = getIndentAt(text, entry.start);
      const newObjStr = formatSignalObject(updatedSignal, indent);
      const newText = text.slice(0, entry.start) + newObjStr + text.slice(entry.end);
      const nextCol = newWave.length > 0 ? Math.min(safeCol, newWave.length - 1) : -1;
      setSelectedSignal(rowIndex, nextCol);
      applyEditorChange(newText, entry.start, entry.start + newObjStr.length);
      setStatus(true, '已删除 ' + updatedSignal.name + ' [' + safeCol + ']');
      return true;
    }

    function waveEditModeLabel() {
      return waveEditMode === 'insert' ? '模式: 插入' : '模式: 修改';
    }

    function toggleWaveEditMode() {
      setWaveEditMode(waveEditMode === 'insert' ? 'modify' : 'insert');
    }

    function setWaveEditMode(mode) {
      if (mode !== 'modify' && mode !== 'insert') return;
      waveEditMode = mode;
      try {
        localStorage.setItem(WAVE_EDIT_MODE_KEY, mode);
      } catch (e) { /* ignore */ }
      updateWaveEditModeUI();
      clearActiveTagIfModified();
      setStatus(true, waveEditModeLabel());
    }

    function loadWaveEditMode() {
      try {
        const saved = localStorage.getItem(WAVE_EDIT_MODE_KEY);
        if (saved === 'modify' || saved === 'insert') waveEditMode = saved;
      } catch (e) { /* ignore */ }
      updateWaveEditModeUI();
    }

    function updateWaveEditModeUI() {
      const btn = document.getElementById('btn-wave-edit-mode');
      if (!btn) return;
      const labelEl = btn.querySelector('.wave-edit-mode-label');
      const isInsert = waveEditMode === 'insert';
      btn.classList.toggle('mode-modify', !isInsert);
      btn.classList.toggle('mode-insert', isInsert);
      if (labelEl) labelEl.textContent = isInsert ? '插入模式' : '修改模式';
      btn.title = isInsert
        ? '当前为插入模式：点击图例在选中列位置插入字符；点击切换为修改模式'
        : '当前为修改模式：点击图例替换选中列字符；点击切换为插入模式';
      btn.setAttribute('aria-label', isInsert ? '插入模式' : '修改模式');
      btn.setAttribute('aria-pressed', isInsert ? 'true' : 'false');
      updateLegendAvailability();
    }

    function updateLegendAvailability() {
      const hasRow = selectedSignalIndex >= 0;
      const hasCol = selectedWaveColumnIndex >= 0;
      let waveLen = 0;
      let signalCount = 0;
      if (hasRow) {
        try {
          const sourceMap = buildSignalSourceMap(editor.value);
          signalCount = sourceMap.length;
          const entry = sourceMap[selectedSignalIndex];
          if (entry) waveLen = (entry.signal.wave || '').length;
        } catch (e) { /* ignore */ }
      }
      const canDeleteCol = hasRow && hasCol && waveLen > 0;
      const deleteColBtn = document.getElementById('btn-delete-wave-col');
      if (deleteColBtn) {
        deleteColBtn.disabled = !canDeleteCol;
        deleteColBtn.title = canDeleteCol
          ? '删除选中位置的 wave 字符'
          : (!hasRow ? '请先在波形区点击选中一行' : (!hasCol ? '请先选中列' : '波形为空，无法删除'));
      }
      const deleteSignalBtn = document.getElementById('btn-delete-signal');
      if (deleteSignalBtn) {
        deleteSignalBtn.disabled = !hasRow;
        deleteSignalBtn.title = hasRow ? '删除当前选中的信号行' : '请先在波形区点击选中一行';
      }
      const canMoveUp = hasRow && selectedSignalIndex > 0;
      const canMoveDown = hasRow && selectedSignalIndex >= 0 && selectedSignalIndex < signalCount - 1;
      const moveUpBtn = document.getElementById('btn-move-signal-up');
      if (moveUpBtn) {
        moveUpBtn.disabled = !canMoveUp;
        moveUpBtn.title = canMoveUp
          ? '将当前选中的信号行上移'
          : (!hasRow ? '请先在波形区点击选中一行' : '已在首行，无法上移');
      }
      const moveDownBtn = document.getElementById('btn-move-signal-down');
      if (moveDownBtn) {
        moveDownBtn.disabled = !canMoveDown;
        moveDownBtn.title = canMoveDown
          ? '将当前选中的信号行下移'
          : (!hasRow ? '请先在波形区点击选中一行' : '已在末行，无法下移');
      }
      const actionHint = waveEditMode === 'insert'
        ? '点击在选中列位置插入波形字符'
        : '点击替换选中列的波形字符';
      document.querySelectorAll('.legend-item').forEach(item => {
        item.classList.toggle('legend-disabled', !hasRow);
        item.title = hasRow ? actionHint : '请先在波形区点击选中一行';
      });
    }

    function setSelectedSignal(rowIndex, colIndex) {
      selectedSignalIndex = rowIndex;
      if (rowIndex < 0) {
        selectedWaveColumnIndex = -1;
      } else if (colIndex !== undefined) {
        selectedWaveColumnIndex = colIndex;
      }
      updateLegendAvailability();
    }

    function setSelectedSignalIndex(index) {
      setSelectedSignal(index, index >= 0 ? (selectedWaveColumnIndex >= 0 ? selectedWaveColumnIndex : 0) : -1);
    }

    function appendColumnHighlight(drawGroup, wave, colIndex, unitWidth, highlightClass) {
      if (!drawGroup || colIndex < 0) return;
      const step = unitWidth || WAVE_UNIT_WIDTH;
      const cls = highlightClass || 'wave-col-highlight';

      const cols = buildWaveColumnMap(drawGroup, wave || '', unitWidth);
      const col = cols[colIndex];
      let x0;
      let x1;
      if (col && col.x1 > col.x0) {
        x0 = col.x0;
        x1 = col.x1;
      } else {
        x0 = colIndex * step;
        x1 = (colIndex + 1) * step;
      }

      let height = 24;
      try {
        height = Math.max(20, drawGroup.getBBox().height + 4);
      } catch (e) { /* ignore */ }

      const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('class', cls);
      rect.setAttribute('x', x0);
      rect.setAttribute('y', -2);
      rect.setAttribute('width', x1 - x0);
      rect.setAttribute('height', height);
      rect.setAttribute('pointer-events', 'none');
      drawGroup.appendChild(rect);
    }

    function updateColumnHighlight(lane, drawGroup, wave, colIndex, unitWidth, highlightClass) {
      if (!drawGroup) return;
      drawGroup.querySelectorAll('.wave-col-highlight, .wave-col-highlight-from, .wave-col-highlight-to')
        .forEach(el => el.remove());
      appendColumnHighlight(drawGroup, wave, colIndex, unitWidth, highlightClass);
    }

    function isConnectionPickFlow() {
      return connectionAddSessionActive && connectionPickActive;
    }

    function areConnectionPresetsEnabledForInsert() {
      return connectionAddSessionActive && connectionFromPoint && connectionToPoint;
    }

    function getEdgeStyleSignature(edgeStr) {
      const { prefix, arrow } = parseEdgeString(edgeStr);
      return prefix + '\0' + arrow;
    }

    function getPresetStyleSignature(template) {
      const sample = buildEdgeFromTemplate(template, 'x', 'y', '');
      const { prefix, arrow } = parseEdgeString(sample);
      return prefix + '\0' + arrow;
    }

    function findPresetIndexForEdge(edgeStr) {
      const sig = getEdgeStyleSignature(edgeStr);
      for (let i = 0; i < EDGE_STYLE_PRESETS.length; i++) {
        if (getPresetStyleSignature(EDGE_STYLE_PRESETS[i].template) === sig) {
          return i;
        }
      }
      return -1;
    }

    function findPresetIndexForTemplate(template) {
      for (let i = 0; i < EDGE_STYLE_PRESETS.length; i++) {
        if (EDGE_STYLE_PRESETS[i].template === template) {
          return i;
        }
      }
      return -1;
    }

    function updateConnectionPresetSelection() {
      const list = document.getElementById('connection-list');
      if (!list) return;

      let activeIndex = -1;
      if (selectedEdgeIndex >= 0) {
        try {
          const edges = JSON.parse(editor.value).edge || [];
          if (selectedEdgeIndex < edges.length) {
            activeIndex = findPresetIndexForEdge(edges[selectedEdgeIndex]);
          }
        } catch (e) { /* ignore */ }
      } else if (pendingEdgeTemplate && areConnectionPresetsEnabledForInsert()) {
        activeIndex = findPresetIndexForTemplate(pendingEdgeTemplate);
      }

      list.querySelectorAll('.connection-item').forEach((item, index) => {
        item.classList.toggle('preset-matches-selected', index === activeIndex && activeIndex >= 0);
      });
    }

    function updateConnectionPresetDisabledState() {
      const list = document.getElementById('connection-list');
      if (!list) return;
      const insertPhase = areConnectionPresetsEnabledForInsert();
      list.querySelectorAll('.connection-item').forEach((item) => {
        const enabled = connectionAddSessionActive
          ? insertPhase
          : selectedEdgeIndex >= 0;
        item.classList.toggle('disabled', !enabled);
      });
      updateConnectionPresetSelection();
    }

    function endConnectionAddSession() {
      connectionAddSessionActive = false;
      pendingEdgeTemplate = null;
      clearConnectionPoints();
      updateConnectionPresetDisabledState();
    }

    function scheduleConnectionHighlightUpdate(lanes, sourceMap) {
      pendingHighlightLanes = lanes;
      pendingHighlightSourceMap = sourceMap;
      if (connectionHighlightRaf !== null) return;
      connectionHighlightRaf = requestAnimationFrame(() => {
        connectionHighlightRaf = null;
        const lanesRef = pendingHighlightLanes;
        const mapRef = pendingHighlightSourceMap;
        pendingHighlightLanes = null;
        pendingHighlightSourceMap = null;
        if (lanesRef && mapRef) {
          updateConnectionPointHighlights(lanesRef, mapRef);
        }
      });
    }

    function refreshConnectionHighlightsFromDom() {
      const svg = waveContainer.querySelector('svg');
      if (!svg) return;
      const lanes = getWaveLaneGroups(svg);
      let sourceMap = [];
      try {
        sourceMap = buildSignalSourceMap(editor.value);
      } catch (e) { /* ignore */ }
      scheduleConnectionHighlightUpdate(lanes, sourceMap);
    }

    function updateConnectionPointHighlights(lanes, sourceMap) {
      const unitWidth = getWaveUnitWidth(editor.value);
      lanes.forEach((lane, idx) => {
        const drawGroup = lane.querySelector('[id^="wavelane_draw_"]');
        if (!drawGroup || !sourceMap[idx]) return;
        const wave = sourceMap[idx].signal.wave || '';

        const isFrom = connectionFromPoint && connectionFromPoint.rowIndex === idx;
        const isTo = connectionToPoint && connectionToPoint.rowIndex === idx;
        const isSelected = selectedSignalIndex === idx;

        drawGroup.querySelectorAll('.wave-col-highlight, .wave-col-highlight-from, .wave-col-highlight-to')
          .forEach(el => el.remove());

        if (isFrom) {
          appendColumnHighlight(drawGroup, wave, connectionFromPoint.colIndex, unitWidth, 'wave-col-highlight-from');
        }
        if (isTo) {
          appendColumnHighlight(drawGroup, wave, connectionToPoint.colIndex, unitWidth, 'wave-col-highlight-to');
        }
        if (isSelected && !isFrom && !isTo) {
          appendColumnHighlight(drawGroup, wave, selectedWaveColumnIndex, unitWidth, 'wave-col-highlight');
        }
      });
    }

    function restoreWaveSelection(lanes, sourceMap) {
      if (selectedSignalIndex < 0 && !connectionFromPoint && !connectionToPoint) return;
      if (selectedSignalIndex >= lanes.length) {
        setSelectedSignal(-1, -1);
      }

      lanes.forEach((lane, idx) => {
        lane.classList.toggle('wave-lane-selected', idx === selectedSignalIndex);
      });

      updateConnectionPointHighlights(lanes, sourceMap);
      updateLegendAvailability();
    }

    function applyLegendCharToSelection(char) {
      if (selectedSignalIndex < 0) {
        setStatus(false, '请先在波形区点击选中一行');
        return;
      }

      let wave = '';
      try {
        const sourceMap = buildSignalSourceMap(editor.value);
        const entry = sourceMap[selectedSignalIndex];
        if (entry) wave = entry.signal.wave || '';
      } catch (e) { /* use defaults below */ }

      const forInsert = waveEditMode === 'insert';
      const col = resolveLegendColumnIndex(wave, forInsert);
      if (forInsert) {
        applyWaveCharInsertAtColumn(selectedSignalIndex, col, char);
      } else {
        applyWaveCharAtColumn(selectedSignalIndex, col, char);
      }
    }

    function insertNewSignalRow(template) {
      const tpl = Object.assign({}, template || DEFAULT_NEW_SIGNAL_TEMPLATE);

      let parsed;
      try {
        parsed = JSON.parse(editor.value);
      } catch (e) {
        setStatus(false, 'JSON 错误，无法插入');
        return;
      }
      if (!parsed.signal) parsed.signal = [];

      const text = editor.value;
      const bounds = findSignalArrayBounds(text);
      if (!bounds) {
        setStatus(false, '未找到 signal 数组');
        return;
      }

      pushUndoBeforeChange();
      const indent = getIndentAt(text, bounds.arrStart) || '  ';
      const sigIndent = indent + '  ';
      const newObjStr = formatSignalObject(tpl, sigIndent);
      const beforeClose = text.slice(0, bounds.insertBefore).replace(/\s*$/, '');
      const afterClose = text.slice(bounds.insertBefore);
      const needsComma = /\S/.test(beforeClose.slice(bounds.arrStart));
      const insertion = (needsComma ? ',\n' : '\n') + newObjStr + '\n' + indent;
      const insertPos = bounds.insertBefore;
      const newText = beforeClose + insertion + afterClose;
      const selStart = insertPos + insertion.indexOf(newObjStr);
      const newMap = buildSignalSourceMap(newText);
      const newIndex = newMap.length - 1;
      if (!tpl.name) pendingNameEditSignalIndex = newIndex;
      setSelectedSignal(newIndex, 0);
      applyEditorChange(newText, selStart, selStart + newObjStr.length);
      setStatus(true, tpl.name ? ('已插入信号: ' + tpl.name) : '已插入空白信号行');
    }

    function removeSignalFromText(text, index) {
      const sourceMap = buildSignalSourceMap(text);
      if (index < 0 || index >= sourceMap.length) return text;

      const entry = sourceMap[index];
      const absStart = entry.start;
      const absEnd = entry.end;
      const bounds = findSignalArrayBounds(text);
      if (!bounds) return text;

      const before = text.slice(bounds.arrStart, absStart);
      const after = text.slice(absEnd, bounds.arrEnd);

      let start = absStart;
      let end = absEnd;
      const trailingComma = after.match(/^\s*,\s*/);
      const leadingComma = before.match(/,\s*$/);
      if (trailingComma) {
        end = absEnd + trailingComma[0].length;
      } else if (leadingComma) {
        start = absStart - leadingComma[0].length;
      }
      return text.slice(0, start) + text.slice(end);
    }

    function swapAdjacentSignalsInText(text, indexA, indexB) {
      const sourceMap = buildSignalSourceMap(text);
      const low = Math.min(indexA, indexB);
      const high = Math.max(indexA, indexB);
      if (low < 0 || high >= sourceMap.length || high - low !== 1) return text;

      const entryLow = sourceMap[low];
      const entryHigh = sourceMap[high];
      const sliceLow = text.slice(entryLow.start, entryLow.end);
      const sliceHigh = text.slice(entryHigh.start, entryHigh.end);
      const middle = text.slice(entryLow.end, entryHigh.start);
      const newBlock = sliceHigh + middle + sliceLow;
      return text.slice(0, entryLow.start) + newBlock + text.slice(entryHigh.end);
    }

    function adjustConnectionPointAfterRowDelete(deletedIndex) {
      function adjust(pt) {
        if (!pt) return null;
        if (pt.rowIndex === deletedIndex) return null;
        if (pt.rowIndex > deletedIndex) return { rowIndex: pt.rowIndex - 1, colIndex: pt.colIndex };
        return pt;
      }
      connectionFromPoint = adjust(connectionFromPoint);
      connectionToPoint = adjust(connectionToPoint);
      updateConnectionPointStatusUI();
    }

    function adjustConnectionPointAfterRowSwap(fromIndex, toIndex) {
      function adjust(pt) {
        if (!pt) return null;
        if (pt.rowIndex === fromIndex) return { rowIndex: toIndex, colIndex: pt.colIndex };
        if (pt.rowIndex === toIndex) return { rowIndex: fromIndex, colIndex: pt.colIndex };
        return pt;
      }
      connectionFromPoint = adjust(connectionFromPoint);
      connectionToPoint = adjust(connectionToPoint);
      updateConnectionPointStatusUI();
    }

    function adjustPendingNameEditAfterRowDelete(deletedIndex) {
      if (pendingNameEditSignalIndex < 0) return;
      if (pendingNameEditSignalIndex === deletedIndex) {
        pendingNameEditSignalIndex = -1;
      } else if (pendingNameEditSignalIndex > deletedIndex) {
        pendingNameEditSignalIndex--;
      }
    }

    function adjustPendingNameEditAfterRowSwap(fromIndex, toIndex) {
      if (pendingNameEditSignalIndex < 0) return;
      if (pendingNameEditSignalIndex === fromIndex) {
        pendingNameEditSignalIndex = toIndex;
      } else if (pendingNameEditSignalIndex === toIndex) {
        pendingNameEditSignalIndex = fromIndex;
      }
    }

    function moveSelectedSignalRow(delta) {
      if (selectedSignalIndex < 0) {
        setStatus(false, '请先在波形区点击选中一行');
        return;
      }
      if (delta !== -1 && delta !== 1) return;

      try {
        JSON.parse(editor.value);
      } catch (e) {
        setStatus(false, 'JSON 错误，无法移动');
        return;
      }

      const sourceMap = buildSignalSourceMap(editor.value);
      const fromIndex = selectedSignalIndex;
      const toIndex = fromIndex + delta;
      if (toIndex < 0 || toIndex >= sourceMap.length) return;

      const entry = sourceMap[fromIndex];
      const signalName = entry ? (entry.signal.name || ('row' + fromIndex)) : ('row' + fromIndex);

      pushUndoBeforeChange();
      const text = editor.value;
      const newText = swapAdjacentSignalsInText(text, fromIndex, toIndex);
      if (newText === text) {
        setStatus(false, '无法移动信号行');
        return;
      }

      adjustConnectionPointAfterRowSwap(fromIndex, toIndex);
      adjustPendingNameEditAfterRowSwap(fromIndex, toIndex);
      setSelectedSignal(toIndex, selectedWaveColumnIndex >= 0 ? selectedWaveColumnIndex : 0);
      applyEditorChange(newText, editor.selectionStart, editor.selectionEnd);
      setStatus(true, (delta < 0 ? '已上移信号行: ' : '已下移信号行: ') + signalName);
    }

    function deleteSelectedSignalRow() {
      if (selectedSignalIndex < 0) {
        setStatus(false, '请先在波形区点击选中一行');
        return;
      }

      try {
        JSON.parse(editor.value);
      } catch (e) {
        setStatus(false, 'JSON 错误，无法删除');
        return;
      }

      const text = editor.value;
      const sourceMap = buildSignalSourceMap(text);
      const deletedIndex = selectedSignalIndex;
      const entry = sourceMap[deletedIndex];
      if (!entry) {
        setStatus(false, '未找到要删除的信号行');
        setSelectedSignal(-1, -1);
        return;
      }

      const signalName = entry.signal.name || ('row' + deletedIndex);
      const deletedNodeChars = new Set();
      const nodeStr = entry.signal.node || '';
      for (let i = 0; i < nodeStr.length; i++) {
        if (nodeStr[i] !== '.') deletedNodeChars.add(nodeStr[i]);
      }

      pushUndoBeforeChange();
      let newText = removeSignalFromText(text, deletedIndex);
      if (newText === text) {
        setStatus(false, '未找到要删除的信号行');
        return;
      }

      let parsed;
      try {
        parsed = JSON.parse(newText);
      } catch (e) {
        setStatus(false, 'JSON 错误，删除失败');
        return;
      }

      const nodeUpdates = cleanupOrphanedNodeUpdates(parsed);
      if (nodeUpdates.length) {
        newText = applySignalUpdatesInText(newText, nodeUpdates);
        parsed = JSON.parse(newText);
      }

      const newCount = flattenSignals(parsed.signal || []).length;
      adjustConnectionPointAfterRowDelete(deletedIndex);
      adjustPendingNameEditAfterRowDelete(deletedIndex);

      let newSelectedIndex = -1;
      if (newCount > 0) {
        newSelectedIndex = deletedIndex >= newCount ? newCount - 1 : deletedIndex;
      }
      setSelectedSignal(newSelectedIndex, newSelectedIndex >= 0 ? 0 : -1);
      applyEditorChange(newText, editor.selectionStart, editor.selectionEnd);

      let statusMsg = '已删除信号行: ' + signalName;
      const affectedEdges = (parsed.edge || []).filter((edgeStr) => {
        const { from, to } = parseEdgeString(edgeStr);
        return deletedNodeChars.has(from) || deletedNodeChars.has(to);
      });
      if (affectedEdges.length) {
        statusMsg += '（' + affectedEdges.length + ' 条连接可能失效）';
      }
      setStatus(true, statusMsg);
    }

    function findEdgeArrayBounds(text) {
      const match = text.match(/"edge"\s*:\s*\[/);
      if (!match) return null;
      const arrStart = match.index + match[0].length;
      let depth = 1;
      let inString = false;
      let escape = false;
      for (let i = arrStart; i < text.length; i++) {
        const c = text[i];
        if (inString) {
          if (escape) escape = false;
          else if (c === '\\') escape = true;
          else if (c === '"') inString = false;
          continue;
        }
        if (c === '"') { inString = true; continue; }
        if (c === '[') depth++;
        if (c === ']') {
