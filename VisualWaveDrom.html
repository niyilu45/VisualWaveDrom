<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VisualWaveDrom</title>
  <script src="inc/skins/default.js?v=20260712"></script>
  <script src="inc/wavedrom.min.js?v=20260712"></script>
  <link rel="stylesheet" href="inc/visualwavedrom.css?v=20260715-wave-paint">
</head>
<body>
  <div class="app" id="app">
    <!-- Nav Sidebar -->
    <aside class="nav-sidebar" id="nav-sidebar">
      <div class="sidebar-header">
        <h1>波形目录</h1>
        <p>目录与波形图</p>
      </div>

      <div class="menu-section">
        <div class="menu-section-title">波形目录</div>
        <div class="nav-toolbar">
          <button class="menu-btn nav-btn" id="btn-nav-add-wave-document" type="button" title="在当前标题下新建空波形图">
            <span>新增波形图</span>
          </button>
        </div>
        <div class="nav-tree" id="nav-tree"></div>
      </div>
    </aside>
    <div class="nav-resize-handle" id="nav-resize-handle" role="separator" aria-label="调整波形目录宽度" aria-orientation="vertical"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1>VisualWaveDrom</h1>
        <p>波形可视化编辑器</p>
      </div>

      <!-- Function Menu -->
      <div class="menu-section">
        <div class="menu-section-title">功能菜单</div>
        <button class="menu-btn" id="btn-toggle-json-panel" type="button" title="隐藏 WaveDrom JSON 窗口">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M4 4l16 16"/>
            <path d="M9.9 4.2A10.7 10.7 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-3.2 4.2"/>
            <path d="M6.6 6.6C3.9 8.4 1 12 1 12s4 8 11 8a10.7 10.7 0 0 0 3.4-.6"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <span id="toggle-json-panel-label">隐藏 JSON</span>
        </button>
        <button class="menu-btn" id="btn-toggle-nav-sidebar" type="button" title="隐藏波形目录">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <line x1="9" y1="3" x2="9" y2="21"/>
            <polyline points="13 9 16 12 13 15"/>
          </svg>
          <span id="toggle-nav-sidebar-label">隐藏目录</span>
        </button>
        <div class="wave-library-file-status" id="wave-library-file-status">波形库：本地浏览器数据</div>
        <button class="menu-btn" id="btn-import-wave-library" type="button" title="导入完整波形库 JSON 文件">
          <span>导入波形库</span>
        </button>
        <button class="menu-btn" id="btn-save-wave-library" type="button" title="保存完整波形库 JSON 文件">
          <span id="save-wave-library-label">保存波形库</span>
        </button>
        <button class="menu-btn" id="btn-change-wave-library" type="button" title="更换当前波形库文件" hidden>
          <span>更换波形库</span>
        </button>
        <input type="file" id="wave-library-import-input" accept="application/json,.json" hidden>
        <button class="menu-btn" id="btn-reading-mode" title="阅读模式">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          阅读模式
        </button>
        <button class="menu-btn" id="btn-undo" title="撤销 (Ctrl+Z)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
          </svg>
          撤销
          <span class="shortcut">Ctrl+Z</span>
        </button>
        <button class="menu-btn" id="btn-redo" title="重做 (Ctrl+Shift+Z)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.13-9.36L23 10"/>
          </svg>
          重做
          <span class="shortcut">Ctrl+Shift+Z</span>
        </button>
        <div class="menu-control-row">
          <label class="menu-control-label" for="input-hscale">水平缩放</label>
          <input type="number" id="input-hscale" class="menu-control-input"
            min="1" max="20" step="1" value="1"
            title="config.hscale（1–20 整数，Enter 或失焦应用）">
        </div>
      </div>

      <!-- Waveform Menu -->
      <div class="menu-section">
        <div class="menu-section-title">波形菜单</div>
        <div class="wave-add-delete-row">
          <button class="menu-btn legend-add-btn" id="btn-add-signal" type="button" title="在 signal 数组末尾插入新信号行">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            新增行
          </button>
          <button class="menu-btn wave-delete-signal-btn" id="btn-delete-signal" type="button" disabled title="请先在波形区点击选中一行">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
              <path d="M10 11v6M14 11v6"/>
              <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
            </svg>
            删除行
          </button>
        </div>
        <div class="wave-move-row">
          <button class="menu-btn wave-move-signal-btn" id="btn-move-signal-up" type="button" disabled title="请先在波形区点击选中一行">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <polyline points="18 15 12 9 6 15"/>
            </svg>
            行上移
          </button>
          <button class="menu-btn wave-move-signal-btn" id="btn-move-signal-down" type="button" disabled title="请先在波形区点击选中一行">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
            行下移
          </button>
        </div>
        <div class="wave-group-row">
          <button class="menu-btn wave-group-signal-btn" id="btn-group-signal" type="button" title="先点击分组，再点击起始行与结束行">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <rect x="4" y="4" width="16" height="16" rx="2"/>
              <path d="M8 9h8M8 15h8"/>
            </svg>
            分组
          </button>
        </div>
        <div class="wave-mode-delete-row">
          <button type="button" class="menu-btn wave-edit-mode-btn mode-modify" id="btn-wave-edit-mode" aria-pressed="false" aria-label="修改模式" title="当前为修改模式：点击图例替换选中列字符；点击切换为插入模式">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
            <span class="wave-edit-mode-label">修改模式</span>
          </button>
          <button type="button" class="menu-btn wave-paint-mode-btn" id="btn-wave-paint-mode" aria-pressed="false" aria-label="&#30011;&#31508;&#27169;&#24335;" title="&#36827;&#20837;&#30011;&#31508;&#27169;&#24335;&#21518;&#65292;&#20808;&#36873;&#25321;&#27874;&#24418;&#65292;&#20877;&#36830;&#32493;&#28857;&#20987;&#26684;&#23376;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="m9.06 11.9 8.07-8.06a2.85 2.85 0 1 1 4.03 4.03l-8.06 8.08"/>
              <path d="M7.07 14c-1.66 0-3 1.35-3 3.02 0 1.33-2.5 1.52-2 2.98 1.08 1.1 2.49 2 4.02 2 2.2 0 4-1.8 4-4a4 4 0 0 0-3.02-3.87z"/>
            </svg>
            <span class="wave-paint-mode-label">&#30011;&#31508;&#27169;&#24335;</span>
          </button>
          <button class="menu-btn wave-delete-col-btn" id="btn-delete-wave-col" type="button" disabled title="请先在波形区点击选中一行">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
              <path d="M10 11v6M14 11v6"/>
              <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
            </svg>
            删除
          </button>
        </div>
        <div class="legend-list" id="legend-list"></div>
      </div>

      <!-- Connection Relations -->
      <div class="menu-section connection-menu-section">
        <div class="menu-section-title">连接关系</div>
        <div class="connection-mode-row">
          <button class="menu-btn legend-add-btn" id="btn-add-connection" type="button" title="依次选择起点和终点，再点击连接线样式生成连接">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            新增连接
          </button>
          <button class="menu-btn connection-select-btn" id="btn-select-connection" type="button" aria-pressed="false" title="进入选择连接线模式，点击图中的连接线查看和修改属性">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M5 4l7 16 2.2-6.2L20 11 5 4z"/>
            </svg>
            <span class="connection-select-label">选择连接线</span>
          </button>
        </div>
        <div class="connection-point-status" id="connection-point-status">点击“新增连接”后选择起点和终点</div>
        <div class="connection-properties" id="connection-properties">
          <div class="connection-property-group">
            <div class="connection-property-label">箭头样式</div>
            <div class="connection-segmented" id="connection-arrow-controls">
              <button type="button" data-arrow-style="start">仅起始箭头</button>
              <button type="button" data-arrow-style="end" class="active">仅终点箭头</button>
              <button type="button" data-arrow-style="both">两端箭头</button>
            </div>
          </div>
          <div class="connection-property-group">
            <div class="connection-property-label">连接线样式</div>
            <div class="connection-line-style-controls" id="connection-list">
              <button type="button" class="connection-line-style-btn active" data-line-style="straight"><span class="connection-line-swatch line-straight"></span><span>实线</span></button>
              <button type="button" class="connection-line-style-btn" data-line-style="dashed"><span class="connection-line-swatch line-dashed"></span><span>虚线</span></button>
              <button type="button" class="connection-line-style-btn" data-line-style="orthogonal"><span class="connection-line-swatch line-orthogonal"></span><span>折线</span></button>
              <button type="button" class="connection-line-style-btn" data-line-style="curve"><span class="connection-line-swatch line-curve"></span><span>曲线</span></button>
            </div>
          </div>
          <div class="connection-label-edit" id="connection-label-edit">
            <div class="connection-label-edit-label" id="connection-label-edit-title">连接标签</div>
            <div class="connection-label-edit-row">
              <input type="text" id="connection-label-input" placeholder="连接线上显示的标签（可选）" spellcheck="false">
              <button type="button" id="btn-apply-edge-label">应用</button>
            </div>
            <div class="connection-label-edit-hint" id="connection-label-edit-hint">新增时先填写标签；选择连接线后可修改</div>
          </div>
        </div>
        <div class="connection-edge-section">
          <div class="connection-edge-title">当前连接</div>
          <div class="connection-edge-list" id="connection-edge-list"></div>
        </div>
      </div>

    </aside>

    <!-- Main -->
    <main class="main">
      <button class="back-btn" id="btn-back" title="返回正常模式">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>

      <div class="wave-panel" id="wave-panel">
        <div class="wave-container" id="wave-container"></div>
        <div class="wave-library-container" id="wave-library-container"></div>
      </div>

      <div class="editor-panel" id="editor-panel">
        <div class="editor-header">
          <span>WaveDrom JSON</span>
          <div class="editor-header-actions">
            <button type="button" class="editor-copy-btn" id="btn-save-tag" title="保存当前波形图">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                <polyline points="17 21 17 13 7 13 7 21"/>
                <polyline points="7 3 7 8 15 8"/>
              </svg>
              <span>保存波形</span>
            </button>
            <button type="button" class="editor-copy-btn" id="btn-format-json" title="格式化并对齐当前 JSON">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <line x1="8" y1="6" x2="21" y2="6"/>
                <line x1="8" y1="12" x2="21" y2="12"/>
                <line x1="8" y1="18" x2="21" y2="18"/>
                <line x1="3" y1="6" x2="3.01" y2="6"/>
                <line x1="3" y1="12" x2="3.01" y2="12"/>
                <line x1="3" y1="18" x2="3.01" y2="18"/>
              </svg>
              <span>格式化</span>
            </button>
            <button type="button" class="editor-copy-btn" id="btn-export-json" title="导出当前波形 JSON 文件">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
              <span>导出</span>
            </button>
            <button type="button" class="editor-copy-btn" id="btn-import-json" title="导入本地波形 JSON 文件">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
              <span>导入</span>
            </button>
            <button type="button" class="editor-copy-btn" id="btn-copy-json" title="复制全部 JSON 到剪贴板">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
              </svg>
              <span class="btn-copy-label">复制 JSON</span>
            </button>
            <input type="file" id="json-import-input" accept="application/json,.json" hidden>
            <div class="editor-status">
              <span class="status-dot" id="status-dot"></span>
              <span id="status-text">就绪</span>
            </div>
          </div>
        </div>
        <div class="editor-wrapper">
          <div class="line-numbers" id="line-numbers"></div>
          <textarea class="code-editor" id="code-editor" spellcheck="false"></textarea>
        </div>
      </div>
    </main>
  </div>

  <!-- Save tag modal -->
  <div class="modal-overlay" id="tag-save-modal" hidden>
    <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="tag-save-modal-title">
      <div class="modal-header" id="tag-save-modal-title">保存波形图</div>
      <div class="modal-body" id="tag-save-form">
        <label class="modal-radio">
          <div class="modal-radio-row">
            <input type="radio" name="tag-save-mode" id="tag-mode-overwrite" value="overwrite">
            <span>覆盖已有波形图</span>
          </div>
          <select class="modal-select modal-radio-control" id="tag-overwrite-select" disabled></select>
        </label>
        <label class="modal-radio">
          <div class="modal-radio-row">
            <input type="radio" name="tag-save-mode" id="tag-mode-new" value="new" checked>
            <span>新增波形图</span>
          </div>
          <input type="text" class="modal-input modal-radio-control" id="tag-new-name-input"
            placeholder="输入波形图名称" spellcheck="false" autocomplete="off">
        </label>
        <div class="modal-hint" id="tag-save-hint"></div>
      </div>
      <div class="modal-body modal-duplicate-confirm" id="tag-save-duplicate" hidden>
        <p id="tag-save-duplicate-msg">波形图名称已存在，是否覆盖？</p>
      </div>
      <div class="modal-footer" id="tag-save-footer">
        <button type="button" class="modal-btn" id="tag-save-cancel">取消</button>
        <button type="button" class="modal-btn modal-btn-primary" id="tag-save-confirm">保存</button>
      </div>
      <div class="modal-footer" id="tag-duplicate-footer" hidden>
        <button type="button" class="modal-btn" id="tag-duplicate-no">否</button>
        <button type="button" class="modal-btn modal-btn-primary" id="tag-duplicate-yes">是</button>
      </div>
    </div>
  </div>

  <!-- Load tag confirm modal -->
  <div class="modal-overlay" id="tag-load-modal" hidden>
    <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="tag-load-modal-title">
      <div class="modal-header" id="tag-load-modal-title">确认还原</div>
      <div class="modal-body modal-duplicate-confirm">
        <p id="tag-load-confirm-msg"></p>
      </div>
      <div class="modal-footer">
        <button type="button" class="modal-btn" id="tag-load-cancel">取消</button>
        <button type="button" class="modal-btn modal-btn-primary" id="tag-load-confirm">放弃修改并还原</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="nav-move-modal" hidden>
    <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="nav-move-modal-title">
      <div class="modal-header" id="nav-move-modal-title">移动波形图</div>
      <div class="modal-body">
        <div class="nav-move-options" id="nav-move-options"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="modal-btn" id="nav-move-cancel">取消</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="wave-library-picker-modal" hidden>
    <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="wave-library-picker-title">
      <div class="modal-header" id="wave-library-picker-title">选择波形库</div>
      <div class="modal-body">
        <div class="nav-move-options" id="wave-library-picker-options"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="modal-btn" id="wave-library-picker-cancel">取消</button>
      </div>
    </div>
  </div>

    <script src="inc/visualwavedrom-app.js?v=20260715-node-only-connections"></script>
</body>
</html>
